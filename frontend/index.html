<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Text Detector</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <h1>AI Text Detector</h1>
    <p class="description">
      Using digital traces that LLM-generated content sometimes leaves behind, and ML models
      trained to predict AI-generated content very accurately at a fraction of the
      computational cost of new AI models.
    </p>

    <textarea id="input-text" placeholder="Paste or type your text here..." rows="12"></textarea>

    <button id="analyze-btn">Analyze</button>

    <div id="result"></div>
  </main>
